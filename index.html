<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>埋め込み用おみくじサンプル</title>
    <link rel="stylesheet" href="./assets/omikuji.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 237, 205, 0.9), transparent 42%),
          linear-gradient(180deg, #f7f1e5 0%, #efe2cc 100%);
        color: #2f2418;
        font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      }

      main {
        width: min(100%, 960px);
      }

      .sample-note {
        margin: 0 0 18px;
        text-align: center;
        line-height: 1.8;
      }

      .embed-example {
        margin-top: 28px;
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="sample-note">
        これは「やしおん」用のおみくじプログラムです。<br />組み込みは下の組み込み例を見てください。
      </p>

      <div data-omikuji data-omikuji-debug="true"></div>

      <section class="embed-example">
        <strong>組み込み例</strong>
        <pre><code>&lt;link rel="stylesheet" href="assets/omikuji.css" /&gt;
&lt;div id="fortune-box"&gt;&lt;/div&gt;
&lt;script src="assets/omikuji.js"&gt;&lt;/script&gt;
&lt;script&gt;
  OmikujiWidget.mount("#fortune-box");
&lt;/script&gt;</code></pre>
      </section>
    </main>

    <script src="./assets/omikuji.js"></script>
  </body>
</html>
