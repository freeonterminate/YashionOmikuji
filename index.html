<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>埋め込み用おみくじサンプル</title>
    <link rel="stylesheet" href="./assets/omikuji.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 237, 205, 0.9), transparent 42%),
          linear-gradient(180deg, #f7f1e5 0%, #efe2cc 100%);
        color: #2f2418;
        font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      }

      main {
        width: min(100%, 960px);
      }

      .sample-note {
        margin: 0 0 18px;
        text-align: center;
        line-height: 1.8;
      }

      .embed-example {
        margin-top: 28px;
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.7);
        font-size: 0.95rem;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="sample-note">
        &#12371;&#12428;&#12399;&#12300;&#12420;&#12375;&#12362;&#12435;&#12301;&#29992;&#12398;&#12362;&#12415;&#12367;&#12376;&#12503;&#12525;&#12464;&#12521;&#12512;&#12391;&#12377;&#12290;<br />&#32068;&#12415;&#36796;&#12415;&#12399;&#19979;&#12398;&#32068;&#12415;&#36796;&#12415;&#20363;&#12434;&#35211;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;<br />
        &#8251;&#27880;&#24847;&#65306;&#38283;&#36939;&#35352;&#20107;&#12399; RSS &#12363;&#12425;&#21462;&#24471;&#12375;&#12390;&#12356;&#12427;&#12398;&#12391; yashion.jp &#12395;&#32622;&#12363;&#12394;&#12356;&#12392;&#21462;&#12428;&#12414;&#12379;&#12435;
      </p>

      <div data-omikuji data-omikuji-debug="true"></div>

      <section class="embed-example">
        <strong>組み込み例</strong>
        <pre><code>&lt;link rel="stylesheet" href="assets/omikuji.css" /&gt;
&lt;div id="fortune-box"&gt;&lt;/div&gt;
&lt;script src="assets/omikuji.js"&gt;&lt;/script&gt;
&lt;script&gt;
  OmikujiWidget.mount("#fortune-box");
&lt;/script&gt;</code></pre>
      </section>
    </main>

    <script src="./assets/omikuji.js"></script>
  </body>
</html>
